<!---1) რა არის ცხრილი?

ცხრილი არის ინფორმაცია, რომელიც წარმოდგენილია რიგებად და სვეტებად
ცხრილი ყოველთვის შეგვიძლია გამოვიყენოთ იმისთვის, რომ მონაცემები მოწესრიგებულად გამოვიტანოთ->

2) რა არის <table> ?
<table> არის HTML თეგი, რომელიც ქმნის ცხრილს.

3) რა არის <thead> ?
<thead> გამოიყენება  სათაურებისთვის.
აქ მოთავსებულია სვეტების სახელები.

4) რა არის <tr> ?
<tr> ნიშნავს table row, ანუ ცხრილის ერთი რიგი.

5) <th> არის ცხრილის სათაური სვეტებისთვის. ყოველთვის გამუქებულია და შუაშია.


6) რა არის <tbody> ?
<tbody> შეიცავს ცხრილის ძირითად ინფორმაციას — მონაცემებს, რომლებიც რიგებშია.
