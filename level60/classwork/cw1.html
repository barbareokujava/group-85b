<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
  .box {
    width: 100px;
    height: 100px;
    background-color:purple;
    
    transition: 2s;
  }
  
  .div :hover{
    animation: animacia 3s ease-in-out infinite;
  }

  @keyframes animacia {
    0% {
      transform: translateY(0) translateX(0);
    }

    10% {
      transform: translateY(200px) translateX(200px);
    }

    25% {
      transform: translate(200px) translateX(200px);
    }

    30% {
      transform: translate(-200px,) translateX(200px);
    }

    40%{
        transform: translate(-200px,) translateX(200px);
    }

    100% {
      transform: translate(0)  translateX(0);
    }
  }
</style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
