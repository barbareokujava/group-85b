<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    @keyframes changeColor {
      from {
        background-color: red;
      }

      to {
        background-color: blue;
      }
    }

    .box {
      width: 100px;
      height: 100px;

      animation: changeColor 3s infinite;
    }

  </style>

</head>
<body>
    <div class="box"></div>
</body>
</html>
