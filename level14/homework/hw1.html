<!--1) Form tag
<form> – ეს არის ჩარჩო, სადაც იწერება ყველა ველი (სახელი, პაროლი და ა.შ.).

2) Label tag
<label> – ველის სათაური. გვაჩვენებს, რა უნდა ჩავწეროთ.

3) Attribute (ატრიბუტი)
ატრიბუტი – დამატებითი ინფორმაციაა თეგისთვის. უხსნის როგორ იმუშაოს.

4) For attribute
for – label-ს აკავშირებს input-თან.

5) Type attribute
type – გვიჩვენებს input-ის ტიპს (text, email, password...).

6) Name attribute
name – input-ის სახელი სერვერისთვის.

7) Id attribute – რა არის?
id ატრიბუტი არის ელემენტის სახელი.
ისევე როგორც ადამიანს აქვს პირადი ნომერი,
HTML ელემენტსაც აქვს თავისი უნიკალური id.

8) Placeholder attribute — რა არის?
placeholder არის ტექსტი, რომელიც input-ის შიგნით ჩნდება.
გვეხმარება გავიგოთ, რა უნდა ჩავწეროთ.

9) Value attribute — რა არის?
value ნიშნავს input-ის მნიშვნელობას.
ან ღილაკის ტექსტს.

10) Required — რა არის?
required ველს სავალდებულოს ხდის.
თუ არაფერი ჩაწერე — არ გაიგზავნება.

11) Br tag — რა არის?
<br> ნიშნავს ხაზის გადატანას.
ახალი ხაზი, როგორც Enter.
