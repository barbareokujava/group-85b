<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <style>
        .box{
            width:100px ;
            height: 100px;
            padding: 50px;
            background-color: purple;
            border: 3px solid black;

            transition: 5.5s all;
        }

         .box:hover{
            transform: translate3d(100px, 50px, 100px);
        }
    </style>
</head>
<body>
    <div class="box"></div>

</body>
</html>
