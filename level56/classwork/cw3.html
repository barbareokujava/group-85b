<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        .box{
            width:100px ;
            height: 100px;
            padding: 50px;
            background-color: purple;
            border: 3px solid black;

            transition: 5.5s all;
        }

        .box:hover{
            transform: scale(10.5,10.5);
            transition: 1.5s all;
        }
        </style>
</head>
<body>
     <div class="box"></div>  
</body>
