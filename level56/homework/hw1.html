<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
         <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: red;
            margin: 100px;

            transform: translateY(50px) scale(2) rotateZ(90deg);
        }

        .box1 {
            width: 100px;
            height: 100px;
            background-color: blue;
            margin: 50px;


            transform: translate(100px, 50px);
        }

        .box2 {
            width: 100px;
            height: 100px;
            background-color: green;
            margin: 50px;

            transform: rotate3d(1, 1, 1, 180deg);
        }

        .box3 {
            width: 100px;
            height: 100px;
            background-color: orange;
            margin: 50px;


            transform: scale(1.5);
        }

        .box4 {
            width: 100px;
            height: 100px;
            background-color: purple;
            margin: 50px;

            transform: rotate3d(1, 1, 0, 45deg);
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box"></div>
</body>
</html>
