<!--1) რა არის Flexbox და რისთვის გამოიყენება?

Flexbox არის CSS-ის სისტემა, რომელიც გამოიყენება ელემენტების სწორად და მარტივად დასალაგებლად ჰორიზონტალურად ან ვერტიკალურად.

2) რა ხდება როცა მშობელს ვუწერთ flex-ს?

მისი შვილები ავტომატურად ერთ ხაზზე დალაგდებიან და შეგვიძლია ვმართოთ მათი მდებარეობა.

3) justify-content-ის მნიშვნელობები და ახსნა

flex-start — ელემენტები იწყება თავიდან (მარცხნიდან).

flex-end — ელემენტები გადადის ბოლოში (მარჯვნივ).

center — ელემენტები განლაგდება შუაში.

space-between — პირველი ელემენტი დასაწყისშია, ბოლო ბოლოშია, შორის სივრცე თანაბარია.

space-around — თითოეულ ელემენტს ორივე მხარეს აქვს სივრცე.

space-evenly — ყველა სივრცე თანაბარია, მათ შორის კიდეებიც.

4) განსხვავება flex-start-სა და center-ს შორის

flex-start აწყობს ელემენტებს თავიდან, ხოლო center აყენებს მათ შუაში.

5) განსხვავება space-between-სა და space-around-ს შორის

space-between-ში კიდეებში სივრცე არ არის, ხოლო space-around-ში კიდეებშიც არის.

6) რას აკეთებს align-items?

align-items აკონტროლებს ელემენტების ვერტიკალურ განლაგებას.

7) align-items-ის მნიშვნელობები

stretch — ელემენტები იწელება მშობლის სიმაღლეზე.

flex-start — ელემენტები ზემოთ მიდის.

flex-end — ელემენტები ქვემოთ მიდის.

center — ელემენტები შუაშია ვერტიკალურად.

baseline — ელემენტები ტექსტის ხაზის მიხედვით სწორდება.

8) რა არის flex-wrap?

flex-wrap გამოიყენება მაშინ, როცა ელემენტები ერთ ხაზზე აღარ ეტევა; ის მათ ახალ ხაზზე გადააქვს და არ აჭუჭყულებს.
