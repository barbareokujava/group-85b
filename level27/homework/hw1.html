<title>რეგისტრაცია</title>
<body>
     <form>
    <label>სახელი და გვარი:</label><br>
    <input type="text" placeholder="შეიყვანეთ სახელი და გვარი"><br><br>

    <label>ემაილი:</label><br>
    <input type="email" placeholder="შეიყვანეთ ემაილი"><br><br>

    <label>პაროლი:</label><br>
    <input type="password" placeholder="შეიყვანეთ პაროლი"><br><br>

        <label>სქესი:</label><br>
    <input type="radio" name="gender"> მამრობითი <br>
    <input type="radio" name="gender"> მდედრობითი <br><br>

    <input type="submit" value="რეგისტრაცია">
</form>
</body>
