<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
/* 1. პარაგრაფი — წყვეტილი border, სისქე 2px, ლურჯი ფერი */
.p1 {
    border: 2px lightblue;
}

/* 2. სურათი — დიდი წითელი border */
.img-border {
    border: 6px lightcoral;
    width: 200px;
}

/* 3. სათაური — სტილის border */
h2 {
    border: 4px lightgreen;
    padding: 10px;
}

/* 4. div — გარე დაშორება ყველა მხრიდან */
.div-margin {
    margin: 30px;
    border: 2px gray;
}

/* 5. div — შიდა დაშორება ყველა მხრიდან */
.div-padding {
    padding: 30px;
    border: 2px plum;
}

/* 6. ელემენტი სხვადასხვა margin-ებით */
.margin-different {
    margin-top: 5px;
    margin-right: 10px;
    margin-bottom: 15px;
    margin-left: 20px;
    border: 2px lightsalmon;
}

/*7. ელემენტი სხვადასხვა padding-ებით*/
.padding-different {
    padding-top: 15px;
    padding-right: 20px;
    padding-bottom: 5px;
    padding-left: 100px;
    border: 2px burlywood;
}
</style>

</head>
<body>
   <p class="p1">ეს არის პარაგრაფი წყვეტილი ლურჯი border-ით</p>

<img src="OIP (12).jpg" class="img-border">

<h2>ეს არის სათაური border-ით</h2>

<div class="div-margin">
    ეს div აქვს გარე დაშორება (margin)
</div>

<div class="div-padding">
    ეს div
</body>
</html>
